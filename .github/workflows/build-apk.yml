name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.4 (exact version, no wrapper needed)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: Print dependency tree (debug)
        run: gradle :app:dependencies --configuration debugRuntimeClasspath --no-daemon || true

      - name: Build debug APK (using gradle directly, not gradlew)
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
