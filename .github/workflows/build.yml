name: Build ESP32 WiFi Analyzer Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware (esp32dev)
        run: pio run -e esp32dev

      - name: Show build size report
        run: pio run -e esp32dev -t size

      - name: Locate build artifacts
        run: |
          echo "Isi folder build:"
          find .pio/build/esp32dev -maxdepth 1 -type f -name "*.bin" -o -name "*.elf" | xargs ls -la

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-wifi-analyzer-firmware
          path: |
            .pio/build/esp32dev/firmware.bin
            .pio/build/esp32dev/firmware.elf
            .pio/build/esp32dev/partitions.bin
            .pio/build/esp32dev/bootloader.bin
          if-no-files-found: error
          retention-days: 30
