name: Decompile APK

on:
  workflow_dispatch:
    inputs:
      apk_path:
        description: "Path APK di dalam repo"
        required: false
        default: "apk/app.apk"
  push:
    paths:
      - "apk/**.apk"

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set APK path
        id: vars
        run: |
          APK_PATH="${{ github.event.inputs.apk_path }}"
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find apk -name "*.apk" | head -n 1)
          fi
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "::error::APK tidak ditemukan di folder apk/"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download JADX
        run: |
          curl -L -o jadx.zip "https://github.com/skylot/jadx/releases/download/v1.5.1/jadx-1.5.1.zip"
          unzip -q jadx.zip -d jadx
          chmod +x jadx/bin/jadx

      - name: Decompile APK to Java source
        run: |
          mkdir -p output/java-source
          ./jadx/bin/jadx --output-dir output/java-source --show-bad-code --no-res "${{ steps.vars.outputs.apk_path }}" || true

      - name: Download apktool
        run: |
          mkdir -p apktool-bin
          curl -L -o apktool-bin/apktool.jar "https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar"

      - name: Decode resources with apktool
        run: |
          mkdir -p output/apktool-decode
          java -jar apktool-bin/apktool.jar decode "${{ steps.vars.outputs.apk_path }}" -o output/apktool-decode -f || true

      - name: Zip hasil
        run: |
          cd output
          zip -r ../decompiled-result.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-source
          path: decompiled-result.zip
          retention-days: 14
