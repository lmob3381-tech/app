name: Build ESP32 Firmware

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e esp32dev

      - name: Build filesystem image (LittleFS from /data)
        run: pio run -e esp32dev -t buildfs

      - name: Collect artifacts
        run: |
          mkdir -p out
          cp .pio/build/esp32dev/firmware.bin out/
          cp .pio/build/esp32dev/firmware.elf out/ || true
          cp .pio/build/esp32dev/littlefs.bin out/
          cp .pio/build/esp32dev/bootloader.bin out/ || true
          cp .pio/build/esp32dev/partitions.bin out/ || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-netscan-firmware
          path: out/
          retention-days: 30
