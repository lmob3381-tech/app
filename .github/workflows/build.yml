name: Build ESP32 Firmware

# Compile otomatis tiap kali ada push/PR ke main, ATAU dijalankan manual
# lewat tab "Actions" -> pilih workflow ini -> "Run workflow"
# (tombol "Run workflow" juga muncul di app GitHub Mobile).
on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "platformio.ini"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}   # supaya bisa trigger manual dari HP tanpa push baru

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware (esp32dev)
        run: pio run -e esp32dev

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32dev
          path: |
            .pio/build/esp32dev/firmware.bin
            .pio/build/esp32dev/firmware.elf
            .pio/build/esp32dev/bootloader.bin
            .pio/build/esp32dev/partitions.bin
          if-no-files-found: error
          retention-days: 30
