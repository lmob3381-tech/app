name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper (jika belum ada)
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: wifihome-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Build release APK unsigned (bisa ditandatangani manual nanti kalau perlu publish)
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: wifihome-release-apk-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
