name: PlatformIO Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/platformio.ini') }}

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build firmware
        run: pio run -e esp32doit-devkit-v1

      - name: Collect all flashable binaries
        run: |
          BUILD_DIR=.pio/build/esp32doit-devkit-v1
          mkdir -p out
          cp "$BUILD_DIR/bootloader.bin" out/
          cp "$BUILD_DIR/partitions.bin" out/
          cp "$BUILD_DIR/firmware.bin" out/
          # boot_app0.bin lives inside the arduino framework package, not in build dir
          BOOT_APP0=$(find ~/.platformio -name boot_app0.bin | head -n1)
          cp "$BOOT_APP0" out/boot_app0.bin
          ls -la out

      - name: Merge into single flashable binary
        run: |
          pip install esptool
          python -m esptool --chip esp32 merge_bin \
            -o out/merged-firmware.bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            0x1000 out/bootloader.bin \
            0x8000 out/partitions.bin \
            0xe000 out/boot_app0.bin \
            0x10000 out/firmware.bin

      - name: Upload individual binaries
        uses: actions/upload-artifact@v4
        with:
          name: firmware-parts
          path: |
            out/bootloader.bin
            out/partitions.bin
            out/boot_app0.bin
            out/firmware.bin

      - name: Upload merged single-file firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-merged
          path: out/merged-firmware.bin
