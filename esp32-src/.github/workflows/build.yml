name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build firmware
        run: pio run -e esp32dev

      - name: Build filesystem image (LittleFS)
        run: pio run -e esp32dev -t buildfs

      - name: Collect build outputs
        run: |
          mkdir -p out
          cp .pio/build/esp32dev/firmware.bin out/
          cp .pio/build/esp32dev/firmware.elf out/ || true
          cp .pio/build/esp32dev/littlefs.bin out/ || true
          cp .pio/build/esp32dev/bootloader.bin out/ || true
          cp .pio/build/esp32dev/partitions.bin out/ || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: out/
          retention-days: 30
