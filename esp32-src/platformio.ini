; PlatformIO Project Configuration File
; ESP32 Captive Portal with Splash Page + MP3 (played on user's phone) + Internet Bridging (NAT)
;
; IMPORTANT: NAT (IPv4 NAPT) requires arduino-esp32 core that ships lwip_napt.h
; (core >= 2.0.0, i.e. platform espressif32 >= 5.x). We pin a known-good version below.

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200

board_build.partitions = default.csv
board_build.filesystem = littlefs

lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    esphome/AsyncTCP-esphome @ ^2.0.1

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_LWIP_IP_FORWARD=1
    -DCONFIG_LWIP_IPV4_NAPT=1
