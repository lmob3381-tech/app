; PlatformIO Project Configuration File
; ESP32 Captive Splash Portal (klik tombol -> audio bunyi)
; Tanpa NAT/internet-forwarding (fitur itu dihapus karena tidak didukung
; secara reliable oleh Arduino framework di ESP32 - lihat README.md)

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200

board_build.partitions = default.csv
board_build.filesystem = littlefs

lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    esphome/AsyncTCP-esphome @ ^2.0.1

build_flags =
    -DCORE_DEBUG_LEVEL=1
