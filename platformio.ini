; PlatformIO Project Configuration File
; ESP32 DevKit V1 — WiFi Home Monitor Network Probe

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Kecepatan upload & monitor serial
upload_speed = 921600
monitor_speed = 115200

; Library yang dipakai (auto-download oleh PlatformIO, jangan install manual)
lib_deps =
    me-no-dev/ESP Async WebServer @ 1.2.3
    me-no-dev/AsyncTCP @ 1.1.1
    bblanchon/ArduinoJson @ ^7.1.0
    tzapu/WiFiManager @ ^2.0.17

; Partition scheme default cukup untuk project ini
board_build.partitions = default.csv

; Filesystem tidak dipakai (kredensial WiFi disimpan WiFiManager di NVS)
