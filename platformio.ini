; PlatformIO Project Configuration File
; ESP32 WiFi Network Analyzer + AP Deployer + Web Control Panel

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    ESP32Ping @ ^1.7

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17
build_unflags =
    -std=gnu++11

board_build.filesystem = littlefs
board_build.partitions = default.csv
