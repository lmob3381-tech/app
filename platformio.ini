; ---------------------------------------------------------------------
;  PlatformIO Project Configuration File
;  Board  : ESP32 DevKit V1 (esp32dev / WROOM-32)
;  Project: ESP32 WiFi Analyzer & Toolkit
; ---------------------------------------------------------------------

[env:esp32dev]
; Dikunci ke platform espressif32 versi 6.x, yang menggunakan
; Arduino-ESP32 core v2.0.x. Ini penting karena firmware ini memakai
; API lawas tcpip_adapter_get_sta_list() untuk membaca daftar client
; SoftAP; API tsb sudah dihapus di Arduino-ESP32 core v3.x (yang
; dipakai platform espressif32 versi 53.x+ / ESP-IDF 5.x).
platform = espressif32@6.9.0
board = esp32dev
framework = arduino


; Gunakan partition scheme dengan ruang app lebih besar (aman untuk
; async web server + banyak string PROGMEM dashboard)
board_build.partitions = default.csv

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    me-no-dev/ESP Async WebServer @ ^1.2.4
    me-no-dev/AsyncTCP @ ^1.1.4
    bblanchon/ArduinoJson @ ^6.21.5

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
